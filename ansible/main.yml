- hosts: localhost
  connection: local
  tasks:
    - name: Instalar software base (Pacman)
      become: yes
      community.general.pacman:
        name: 
          - kitty
          - docker
          - docker-compose
          - helix
          - zellij
          - fish
          - wl-clipboard
          - starship
        state: present
        update_cache: yes[cite: 1]

    - name: Instalar software de comunidad (AUR)
      kewlfft.aur.aur:
        name: 
          - yay
          - television
          - hplip-plugin
          - ghostty
        state: present
      become: no # Yay nunca debe correr como root

    - name: Configurar servicios de sistema
      become: yes
      systemd:
        name: docker
        enabled: yes
        state: started[cite: 1]
